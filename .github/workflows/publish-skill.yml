name: Publish Skill

# Packages the strut Agent Skill as a .skill zip and attaches it to the
# GitHub release. The gfargo/skills repo's sync workflow pulls from here.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package skill
        run: |
          cd .kiro/skills/strut
          zip -r /tmp/strut.skill . -x '*.DS_Store'
          echo "Packaged skill: $(du -h /tmp/strut.skill | cut -f1)"

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/strut.skill \
            --clobber
