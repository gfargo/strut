name: Update Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sync (e.g. v0.35.0) — for manually catching up a release that didn't trigger this workflow (see note below)"
        required: true

# NOTE: releases published by release-please-action using the default
# GITHUB_TOKEN do NOT trigger this workflow — GitHub suppresses
# workflow-triggering for events created by the default GITHUB_TOKEN,
# specifically to prevent runaway recursive triggering. That silently broke
# this workflow for v0.31.0–v0.35.0 (5 releases) until release-please.yml was
# given a real PAT/App token instead (see that workflow's comments). If it
# ever regresses, use the workflow_dispatch `tag` input above to catch up
# manually rather than editing the tap by hand.

jobs:
  update-tap:
    name: Update gfargo/homebrew-tap
    runs-on: ubuntu-latest
    # Only run for stable releases (not pre-releases / draft releases).
    # Pre-releases (rc, alpha, beta) should not advance the tap formula.
    # github.event.release.* is empty (falsy) for workflow_dispatch, so this
    # still evaluates true and the job runs normally in that case.
    if: ${{ !github.event.release.prerelease && !github.event.release.draft }}
    steps:
      - name: Get release info
        id: release
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download release tarball and compute SHA256
        id: sha
        run: |
          URL="https://github.com/gfargo/strut/archive/refs/tags/${{ steps.release.outputs.tag }}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: gfargo/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          cat > Formula/strut.rb << 'FORMULA'
          # strut — CLI for managing Docker stacks on VPS infrastructure.
          #
          #   brew install gfargo/tap/strut
          #
          # Auto-updated by strut release workflow.

          class Strut < Formula
            desc "CLI tool for managing Docker stacks on VPS infrastructure"
            homepage "https://github.com/gfargo/strut"
            url "${{ steps.sha.outputs.url }}"
            sha256 "${{ steps.sha.outputs.sha256 }}"
            license "MIT"

            depends_on "bash"

            def install
              libexec.install Dir["*"]
              bin.install_symlink libexec/"strut"
            end

            def caveats
              <<~EOS
                strut is installed. To get started:

                  strut init --registry ghcr --org my-org
                  strut scaffold my-app
                  strut --help

                Shell completions:
                  strut completions bash > $(brew --prefix)/etc/bash_completion.d/strut
                  strut completions zsh > $(brew --prefix)/share/zsh/site-functions/_strut
                  strut completions fish > ~/.config/fish/completions/strut.fish
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/strut --version").strip
            end
          end
          FORMULA

          # Fix indentation (heredoc adds leading spaces)
          sed -i 's/^          //' Formula/strut.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/strut.rb
          git commit -m "strut ${{ steps.release.outputs.version }}"
          git push
