# ==================================================
# .github/workflows/deploy.yml — SSH deploy via strut
# ==================================================
# Triggers after CI passes on main.
# SSHes to the VPS and runs strut <stack> deploy.
#
# Required secrets (set at org or repo level):
#   VPS_HOST        — VPS IP or hostname
#   VPS_USER        — SSH username (e.g. ubuntu)
#   VPS_SSH_KEY     — private SSH key for VPS access
#   DEPLOY_STACK    — stack name (e.g. my-stack)
#   DEPLOY_ENV      — env name (e.g. prod) — reads .<env>.env on VPS

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/${{ secrets.DEPLOY_DIR || 'strut' }}
            git pull --ff-only
            strut ${{ secrets.DEPLOY_STACK || 'my-stack' }} deploy \
              --env ${{ secrets.DEPLOY_ENV || 'prod' }}
