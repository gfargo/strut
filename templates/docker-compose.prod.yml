# ==================================================
# docker-compose.prod.yml — Production service template
# ==================================================
# Replace SERVICE_NAME, PORT_NUMBER, YOUR_ORG with your values.
# Add this file to stacks/<stack-name>/docker-compose.yml

x-build-args: &build-args
  GH_TOKEN: ${GH_TOKEN}

x-common-env: &common-env
  REDIS_URL: redis://redis:6379
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

services:
  # ── Infrastructure ────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Your service ─────────────────────────────────────────────────────────
  # Replace SERVICE_NAME, PORT_NUMBER, and YOUR_ORG

  SERVICE_NAME:
    build:
      context: https://github.com/YOUR_ORG/SERVICE_NAME.git
      args:
        <<: *build-args
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: PORT_NUMBER
    ports:
      - "PORT_NUMBER:PORT_NUMBER"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:PORT_NUMBER/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Reverse Proxy ─────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/letsencrypt
    depends_on:
      - SERVICE_NAME

volumes:
  redis_data:
  postgres_data:
  nginx_certs:
