services:
  api:
    build: ./app
    image: YOUR_ORG/STACK_NAME_PLACEHOLDER-api:latest
    container_name: STACK_NAME_PLACEHOLDER-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: STACK_NAME_PLACEHOLDER-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=STACK_NAME_PLACEHOLDER
      - POSTGRES_USER=STACK_NAME_PLACEHOLDER
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U STACK_NAME_PLACEHOLDER"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
