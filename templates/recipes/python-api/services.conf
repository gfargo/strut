SERVICE_API_NAME=api
SERVICE_API_PORT=8000
SERVICE_API_HEALTH_PATH=/health

SERVICE_POSTGRES_NAME=postgres
SERVICE_POSTGRES_PORT=5432
SERVICE_POSTGRES_DB=true

# api is built locally from ./app (docker-compose.yml has no pullable
# registry image) — without this, deploy defaults to BUILD_MODE=registry,
# the pull is a silent no-op, and docker_require_images aborts the deploy
# before it ever builds.
BUILD_MODE=local
