services:
  ghost:
    image: ghost:${GHOST_VERSION:-5-alpine}
    container_name: STACK_NAME_PLACEHOLDER-ghost
    restart: unless-stopped
    ports:
      - "2368:2368"
    environment:
      - url=${GHOST_URL}
      - database__client=mysql
      - database__connection__host=mysql
      - database__connection__user=ghost
      - database__connection__password=${MYSQL_PASSWORD}
      - database__connection__database=ghost
      - NODE_ENV=production
    volumes:
      - ghost_content:/var/lib/ghost/content
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: STACK_NAME_PLACEHOLDER-mysql
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=ghost
      - MYSQL_USER=ghost
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_RANDOM_ROOT_PASSWORD=1
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$$(cat /etc/mysql/conf.d/passwd 2>/dev/null || echo)"]
      interval: 30s

volumes:
  ghost_content:
  mysql_data:
