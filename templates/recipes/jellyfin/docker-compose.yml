services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: STACK_NAME_PLACEHOLDER-jellyfin
    restart: unless-stopped
    ports:
      - "${JELLYFIN_BIND:-0.0.0.0}:8096:8096"
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - ${MEDIA_PATH:-./media}:/media:ro

volumes:
  jellyfin_config:
  jellyfin_cache:
